<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>교환독서 기록장 — 로그인</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Pen+Script&family=Press+Start+2P&family=Fredoka+One&family=Gamja+Flower&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <link rel="stylesheet" href="login.css">
</head>
<body>


  <div class="login-wrapper">

    <div class="bg-text">BoOK sWAp
wiTH     YOUr
fRIeNDs</div>

    <div class="card">
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('login')">로그인</button>
        <button class="tab-btn" onclick="switchTab('signup')">회원가입</button>
      </div>

      <!-- 로그인 -->
      <div class="tab-panel active" id="panel-login">
        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>✦ 닉네임</label>
            <div class="input-wrap">
              <input type="text" id="login-name" placeholder="닉네임을 입력하세요" autocomplete="username">
            </div>
          </div>
          <div class="form-group">
            <label>✦ 비밀번호</label>
            <div class="input-wrap">
              <input type="password" id="login-pw" placeholder="비밀번호를 입력하세요" class="has-toggle" autocomplete="current-password">
              <button type="button" class="eye-toggle" onclick="togglePw('login-pw',this)">👁</button>
            </div>
          </div>
          <button type="submit" class="submit-btn">OPEN THE PAGE</button>
        </form>
      </div>

      <!-- 회원가입 -->
      <div class="tab-panel" id="panel-signup">
        <form id="signup-form" onsubmit="handleSignup(event)">
          <div class="form-group">
            <label>✦ 닉네임</label>
            <div class="input-wrap">
              <input type="text" id="signup-name" placeholder="사용할 닉네임을 입력하세요" autocomplete="username">
            </div>
          </div>
          <div class="form-group">
            <label>✦ 비밀번호</label>
            <div class="input-wrap">
              <input type="password" id="signup-pw" placeholder="비밀번호를 입력하세요" class="has-toggle" autocomplete="new-password">
              <button type="button" class="eye-toggle" onclick="togglePw('signup-pw',this)">👁</button>
            </div>
          </div>
          <button type="submit" class="submit-btn">JOIN THE CLUB</button>
          <div class="success-msg" id="signup-success">🎉 가입 완료! 로그인해보세요!</div>
        </form>
      </div>
    </div>
  </div>

  <script src="common.js"></script>
  <script src="login.js"></script>
</body>
</html>
