<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>교환독서 기록장 — 로그인</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Pen+Script&family=Press+Start+2P&family=Fredoka+One&family=Gamja+Flower&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes fadeIn   { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes bounce   { 0%,100%{transform:translateY(0)} 40%{transform:translateY(-8px)} 70%{transform:translateY(-4px)} }
    @keyframes shake    { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
    @keyframes sparkle  { 0%,100%{opacity:1;transform:scale(1) rotate(0deg)} 50%{opacity:.6;transform:scale(1.3) rotate(20deg)} }
    @keyframes float    { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-12px) rotate(3deg)} }
    @keyframes float2   { 0%,100%{transform:translateY(0) rotate(5deg)} 50%{transform:translateY(-10px) rotate(-5deg)} }

    body {
      font-family: 'Jua', sans-serif;
      min-height: 100vh;
      background: #FFFFFF;
      background-image:
        radial-gradient(circle, #AEE2FF 1px, transparent 1px),
        radial-gradient(circle, #FFB6D9 1px, transparent 1px);
      background-size: 30px 30px, 60px 60px;
      background-position: 0 0, 15px 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.5s ease;
      overflow-x: hidden;
    }

    /* Floating deco elements */
    body::before {
      content: '⭐ ✦ ♡ ✿ ★';
      position: fixed;
      top: 12%; left: 4%;
      font-size: 22px;
      color: #D4BAFF;
      letter-spacing: 10px;
      animation: float 4s ease-in-out infinite;
      pointer-events: none;
      opacity: 0.7;
    }
    body::after {
      content: '✦ ♡ ⭐ ✿';
      position: fixed;
      bottom: 14%; right: 5%;
      font-size: 22px;
      color: #C8F57A;
      letter-spacing: 10px;
      animation: float2 5s ease-in-out infinite;
      pointer-events: none;
      opacity: 0.7;
    }

    /* HOME button */
    .home-btn {
      position: fixed;
      top: 14px; right: 18px;
      z-index: 999;
      background: linear-gradient(135deg, #D4BAFF, #AEE2FF);
      border: 2px solid white;
      border-radius: 50px;
      padding: 8px 20px;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: white;
      box-shadow: 3px 3px 0 #9B8FCC;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      line-height: 1.6;
      transition: transform 0.15s;
    }
    .home-btn:hover { animation: bounce 0.4s ease; }

    /* Wrapper */
    .login-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 420px;
      padding: 20px;
      animation: fadeIn 0.5s ease;
    }

    /* Logo */
    .logo-area { text-align: center; }

    .logo-pill {
      display: inline-block;
      background: linear-gradient(135deg, #FFB6D9, #D4BAFF);
      border-radius: 50px;
      padding: 10px 28px;
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      color: white;
      letter-spacing: 1px;
      box-shadow: 4px 4px 0 #CC88B0, 0 6px 20px rgba(255,182,217,0.4);
      border: 3px solid white;
      margin-bottom: 12px;
      line-height: 1.6;
    }

    .logo-sub {
      font-family: 'Nanum Pen Script', cursive;
      font-size: 20px;
      color: #888;
      display: block;
    }

    .deco-row {
      display: flex;
      justify-content: center;
      gap: 6px;
      font-size: 20px;
      margin-top: 6px;
      animation: sparkle 2s ease-in-out infinite;
    }

    /* Card */
    .card {
      background: white;
      border-radius: 28px;
      padding: 32px 36px;
      width: 100%;
      border: 3px solid transparent;
      background-clip: padding-box;
      position: relative;
      box-shadow: 6px 6px 0 #AEE2FF, 0 8px 30px rgba(174,226,255,0.3);
      outline: 3px solid #AEE2FF;
    }

    /* Corner stickers */
    .card::before {
      content: '✦';
      position: absolute;
      top: -12px; left: 16px;
      font-size: 22px;
      color: #FFB6D9;
      animation: sparkle 2.5s ease-in-out infinite;
    }
    .card::after {
      content: '★';
      position: absolute;
      bottom: -10px; right: 18px;
      font-size: 20px;
      color: #C8F57A;
      animation: sparkle 3s ease-in-out infinite;
    }

    /* Tabs */
    .tab-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      background: #F5F5FF;
      border-radius: 50px;
      padding: 5px;
    }

    .tab-btn {
      flex: 1;
      background: transparent;
      border: none;
      border-radius: 50px;
      padding: 10px 0;
      font-family: 'Jua', sans-serif;
      font-size: 15px;
      color: #AAAACC;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #AEE2FF, #D4BAFF);
      color: white;
      box-shadow: 2px 2px 0 #9BB8E0;
    }

    /* Panel */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Form */
    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 13px;
      color: #9999BB;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .input-wrap { position: relative; }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2.5px solid #E8E8FF;
      border-radius: 16px;
      font-family: 'Jua', sans-serif;
      font-size: 15px;
      color: #555;
      background: #FAFAFF;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      border-color: #AEE2FF;
      box-shadow: 0 0 0 4px rgba(174,226,255,0.2), 3px 3px 0 #AEE2FF;
    }

    .form-group input.has-toggle { padding-right: 44px; }

    .eye-toggle {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
    }

    .error-msg {
      display: block;
      color: #FF7BAC;
      font-size: 12px;
      margin-top: 5px;
      padding-left: 4px;
    }

    .shake { animation: shake 0.5s ease; }

    /* Bubble submit button */
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #FFB6D9, #D4BAFF);
      border: 3px solid white;
      border-radius: 50px;
      font-family: 'Fredoka One', cursive;
      font-size: 18px;
      color: white;
      cursor: pointer;
      margin-top: 6px;
      box-shadow: 4px 4px 0 #CC88B0, 0 6px 20px rgba(255,182,217,0.35);
      letter-spacing: 1px;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .submit-btn:hover {
      animation: bounce 0.5s ease;
      box-shadow: 5px 6px 0 #CC88B0, 0 8px 24px rgba(255,182,217,0.4);
    }

    .submit-btn:active {
      transform: translateY(3px);
      box-shadow: 1px 1px 0 #CC88B0;
    }

    /* Success */
    .success-msg {
      text-align: center;
      color: #66BB88;
      font-size: 13px;
      margin-top: 12px;
      padding: 10px;
      background: #F0FFF8;
      border-radius: 14px;
      border: 2px dashed #A0D8B8;
      display: none;
      font-family: 'Jua', sans-serif;
    }
  </style>
</head>
<body>

  <a class="home-btn" href="index.html">🏠 HOME</a>

  <div class="login-wrapper">
    <div class="logo-area">
      <div class="logo-pill">📚 BOOK SWAP DIARY</div>
      <span class="logo-sub">함께 읽고, 함께 기록해요</span>
      <div class="deco-row">🌟 ♡ ✦ ♡ 🌟</div>
    </div>

    <div class="card">
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('login')">로그인</button>
        <button class="tab-btn" onclick="switchTab('signup')">회원가입</button>
      </div>

      <!-- 로그인 -->
      <div class="tab-panel active" id="panel-login">
        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>✦ 닉네임</label>
            <div class="input-wrap">
              <input type="text" id="login-name" placeholder="닉네임을 입력하세요" autocomplete="username">
            </div>
          </div>
          <div class="form-group">
            <label>✦ 비밀번호</label>
            <div class="input-wrap">
              <input type="password" id="login-pw" placeholder="비밀번호를 입력하세요" class="has-toggle" autocomplete="current-password">
              <button type="button" class="eye-toggle" onclick="togglePw('login-pw',this)">👁</button>
            </div>
          </div>
          <button type="submit" class="submit-btn">LOGIN ✈</button>
        </form>
      </div>

      <!-- 회원가입 -->
      <div class="tab-panel" id="panel-signup">
        <form id="signup-form" onsubmit="handleSignup(event)">
          <div class="form-group">
            <label>✦ 닉네임</label>
            <div class="input-wrap">
              <input type="text" id="signup-name" placeholder="사용할 닉네임을 입력하세요" autocomplete="username">
            </div>
          </div>
          <div class="form-group">
            <label>✦ 비밀번호</label>
            <div class="input-wrap">
              <input type="password" id="signup-pw" placeholder="비밀번호를 입력하세요" class="has-toggle" autocomplete="new-password">
              <button type="button" class="eye-toggle" onclick="togglePw('signup-pw',this)">👁</button>
            </div>
          </div>
          <button type="submit" class="submit-btn">JOIN ★</button>
          <div class="success-msg" id="signup-success">🎉 가입 완료! 로그인해보세요!</div>
        </form>
      </div>
    </div>
  </div>

  <script>
    // ── Firebase 초기화 ───────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyC_Q9TMiRoNV0lHw9kxL0TagT9B4ZWPPV8",
      authDomain: "bookswap-94dc2.firebaseapp.com",
      databaseURL: "https://bookswap-94dc2-default-rtdb.firebaseio.com",
      projectId: "bookswap-94dc2",
      storageBucket: "bookswap-94dc2.firebasestorage.app",
      messagingSenderId: "198519480023",
      appId: "1:198519480023:web:68c0c0fcfb867b9b371a92"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
    function getCurrentUser() { try { return JSON.parse(sessionStorage.getItem('currentUser')); } catch { return null; } }

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='signup')));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-'+tab).classList.add('active');
    }

    function togglePw(id, btn) {
      const el = document.getElementById(id);
      el.type = el.type==='password' ? 'text' : 'password';
      btn.textContent = el.type==='password' ? '👁' : '🙈';
    }

    function showError(inputEl, msg) {
      const old = inputEl.parentElement.parentElement.querySelector('.error-msg');
      if (old) old.remove();
      const span = document.createElement('span');
      span.className = 'error-msg';
      span.textContent = msg;
      inputEl.parentElement.parentElement.appendChild(span);
      inputEl.classList.add('shake');
      setTimeout(() => { inputEl.classList.remove('shake'); span.remove(); }, 2000);
    }

    function handleSignup(e) {
      e.preventDefault();
      const nameEl = document.getElementById('signup-name');
      const pwEl   = document.getElementById('signup-pw');
      const name = nameEl.value.trim(), pw = pwEl.value.trim();
      if (!name) { showError(nameEl, '닉네임을 입력해주세요'); return; }
      if (!pw)   { showError(pwEl,   '비밀번호를 입력해주세요'); return; }

      db.ref('users').once('value', snap => {
        const usersObj = snap.exists() ? snap.val() : {};
        const users = Object.values(usersObj);
        if (users.some(u => u.name === name)) {
          showError(nameEl, '이미 사용 중인 닉네임이에요');
          return;
        }
        const newUser = { id: generateId(), name, password: pw };
        db.ref('users/' + newUser.id).set(newUser, () => {
          nameEl.value = ''; pwEl.value = '';
          const msg = document.getElementById('signup-success');
          msg.style.display = 'block';
          setTimeout(() => { msg.style.display='none'; switchTab('login'); document.getElementById('login-name').value=name; }, 1600);
        });
      });
    }

    function handleLogin(e) {
      e.preventDefault();
      const nameEl = document.getElementById('login-name');
      const pwEl   = document.getElementById('login-pw');
      const name = nameEl.value.trim(), pw = pwEl.value.trim();
      if (!name) { showError(nameEl, '닉네임을 입력해주세요'); return; }
      if (!pw)   { showError(pwEl,   '비밀번호를 입력해주세요'); return; }

      db.ref('users').once('value', snap => {
        const usersObj = snap.exists() ? snap.val() : {};
        const users = Object.values(usersObj);
        const user = users.find(u => u.name === name && u.password === pw);
        if (!user) { showError(pwEl, '닉네임 또는 비밀번호가 올바르지 않아요'); return; }
        sessionStorage.setItem('currentUser', JSON.stringify({ id: user.id, name: user.name }));
        window.location.href = 'index.html';
      });
    }

    if (getCurrentUser()) window.location.href = 'index.html';
  </script>
</body>
</html>
