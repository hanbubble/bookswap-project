<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>교환독서 기록장 — Private</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Pen+Script&family=Press+Start+2P&family=Fredoka+One&family=Gamja+Flower&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/gh/quiple/galmuri/dist/galmuri.css" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="user-colors.js"></script>
  <link rel="stylesheet" href="private.css">
  <link rel="stylesheet" href="nav.css">
</head>
<body>

  <button class="home-btn" onclick="sessionStorage.removeItem('currentUser'); window.location.href='login.html';">← LOGOUT</button>
  <div class="deco-float-l">⭐<br>♡<br>✦<br>★</div>
  <div class="deco-float-r">✿<br>♡<br>⭐<br>✦</div>

  <div class="chalk-deco" id="chalk-deco" aria-hidden="true"></div>

  <div class="content">

    <!-- 프로필 -->
    <section class="profile-section">
      <div class="profile-card">
        <div class="profile-avatar" id="profile-avatar"></div>
        <div class="profile-info">
          <div class="profile-name" id="profile-name"></div>
          <div class="profile-joined" id="profile-joined"></div>
        </div>
        <div class="profile-stats">
          <div class="stat-item">
            <div class="stat-num" id="stat-books">0</div>
            <div class="stat-label">등록한 책</div>
          </div>
          <div class="stat-item">
            <div class="stat-num" id="stat-reviews">0</div>
            <div class="stat-label">독후감</div>
          </div>
          <div class="stat-item">
            <div class="stat-num" id="stat-passages">0</div>
            <div class="stat-label">구절</div>
          </div>
        </div>
      </div>
    </section>

    <!-- 내가 등록한 책 -->
    <section class="private-section">
      <div class="section-header">
        <span class="section-pill">📚 MY BOOKS</span>
      </div>
      <div class="card-grid" id="my-books"></div>
    </section>

    <!-- 내가 남긴 독후감 -->
    <section class="private-section">
      <div class="section-header">
        <span class="section-pill">✍ MY REVIEWS</span>
      </div>
      <div class="card-grid" id="my-reviews"></div>
    </section>

    <!-- 내가 남긴 구절 -->
    <section class="private-section">
      <div class="section-header">
        <span class="section-pill">✦ MY PASSAGES</span>
      </div>
      <div class="passage-scrapbook" id="my-passages"></div>
    </section>

  </div>

  <div class="toast" id="toast"></div>

  <nav class="mobile-nav">
    <button class="mobile-nav-btn" onclick="window.location.href='waiting.html'">
      <span class="mobile-nav-icon">🚪</span>
      <span class="mobile-nav-label">ROOM</span>
    </button>
    <button class="mobile-nav-btn mobile-nav-home" onclick="goLastRoom()">
      <span class="mobile-nav-icon">🏠</span>
      <span class="mobile-nav-label">HOME</span>
    </button>
    <button class="mobile-nav-btn active" onclick="window.location.href='private.html'">
      <span class="mobile-nav-icon">🔒</span>
      <span class="mobile-nav-label">MY PAGE</span>
    </button>
  </nav>

  <script src="common.js"></script>
  <script src="private.js"></script>
</body>
</html>
