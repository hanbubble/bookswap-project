<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>입장 대기 — 교환독서 기록장</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Pen+Script&family=Press+Start+2P&family=Fredoka+One&family=Gamja+Flower&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="pending.css">

<body>

  <div class="bg-overlay"></div>
  <canvas id="bg-canvas"></canvas>

  <div class="login-wrapper">

      <div class="dot-row">
        <span></span><span></span><span></span>
      </div>
      <div class="wait-hint">승인되면 자동으로 입장돼요</div>
    </div>
  </div>

  <script src="common.js"></script>
  <script src="pending.js"></script>
