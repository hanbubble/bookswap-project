<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>교환독서 기록장 — 책 상세</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Pen+Script&family=Press+Start+2P&family=Fredoka+One&family=Gamja+Flower&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/gh/quiple/galmuri/dist/galmuri.css" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes fadeIn  { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes bounce  { 0%,100%{transform:translateY(0)} 40%{transform:translateY(-8px)} 70%{transform:translateY(-4px)} }
    @keyframes sparkle { 0%,100%{opacity:1;transform:scale(1) rotate(0deg)} 50%{opacity:.5;transform:scale(1.4) rotate(25deg)} }
    @keyframes float   { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-10px) rotate(3deg)} }
    @keyframes float2  { 0%,100%{transform:translateY(0) rotate(4deg)} 50%{transform:translateY(-8px) rotate(-4deg)} }
    @keyframes popIn   { 0%{transform:scale(0.85);opacity:0} 70%{transform:scale(1.04)} 100%{transform:scale(1);opacity:1} }

    body {
      font-family: 'Jua', sans-serif;
      min-height: 100vh;
      animation: fadeIn 0.4s ease;
    }

    /* HOME button */
    .home-btn {
      position: fixed;
      top: 14px; right: 18px;
      z-index: 999;
      background: linear-gradient(135deg, #D4BAFF, #AEE2FF);
      border: 2px solid white;
      border-radius: 50px;
      padding: 8px 20px;
      font-family: 'Press Start 2P', 'Galmuri11', monospace;
      font-size: 9px;
      color: white;
      box-shadow: 3px 3px 0 #9B8FCC;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      line-height: 1.6;
      transition: transform 0.15s;
    }
    .home-btn:hover { animation: bounce 0.4s ease; }

    /* Back button */
    .back-btn {
      position: fixed;
      top: 14px; left: 18px;
      z-index: 999;
      background: white;
      border: 2.5px solid #AEE2FF;
      border-radius: 50px;
      padding: 7px 18px;
      font-family: 'Jua', sans-serif;
      font-size: 13px;
      color: #88BBDD;
      cursor: pointer;
      box-shadow: 2px 2px 0 #AEE2FF;
      text-decoration: none;
      display: inline-block;
      transition: all 0.2s;
    }
    .back-btn:hover { animation: bounce 0.4s ease; }

    /* Floating deco */
    .deco-l {
      position: fixed; top: 20%; left: 0.5%;
      font-size: 18px; color: #D4BAFF; letter-spacing: 8px;
      line-height: 2.2; writing-mode: vertical-rl;
      animation: float 4s ease-in-out infinite;
      pointer-events: none; opacity: .6;
    }
    .deco-r {
      position: fixed; bottom: 18%; right: 0.5%;
      font-size: 18px; color: #C8F57A; letter-spacing: 8px;
      line-height: 2.2; writing-mode: vertical-rl;
      animation: float2 5s ease-in-out infinite;
      pointer-events: none; opacity: .6;
    }

    .content { padding: 68px 20px 20px; }

    /* ── DETAIL LAYOUT ── */
    .detail-layout {
      display: grid;
      grid-template-columns: 34% 66%;
      gap: 20px;
    }

    /* Shared card style */
    .y2k-card {
      background: white;
      border-radius: 20px;
      padding: 16px 18px;
      border: 3px solid #AEE2FF;
      box-shadow: 4px 4px 0 #AEE2FF;
      animation: popIn 0.4s ease backwards;
    }

    .y2k-card.pink  { border-color: #FFB6D9; box-shadow: 4px 4px 0 #FFB6D9; }
    .y2k-card.purple{ border-color: #D4BAFF; box-shadow: 4px 4px 0 #D4BAFF; }
    .y2k-card.green { border-color: #C8F57A; box-shadow: 4px 4px 0 #88CC66; }

    .card-label {
      font-family: 'Press Start 2P', 'Galmuri11', monospace;
      font-size: 7px;
      color: #AAAACC;
      margin-bottom: 10px;
      line-height: 1.8;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .card-label::before { content:'✦'; font-size:12px; color:#D4BAFF; }

    /* ── LEFT PANEL ── */
    .left-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Photo upload */
    .photo-upload-area {
      width: 100%;
      aspect-ratio: 4/3;
      border: 3px dashed #AEE2FF;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      background: white;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .photo-upload-area:hover { border-color: #FFB6D9; background: #FFF8FF; }

    .upload-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: #CCC;
      font-size: 12px;
      text-align: center;
      padding: 16px;
      font-family: 'Jua', sans-serif;
    }

    .upload-placeholder .upload-icon { font-size: 32px; }

    #place-photo {
      width: 100%; height: 100%;
      object-fit: cover;
      display: none;
    }

    /* YouTube */
    .yt-input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .yt-input-row input {
      flex: 1;
      padding: 8px 12px;
      border: 2px solid #E8E8FF;
      border-radius: 50px;
      font-family: 'Jua', sans-serif;
      font-size: 12px;
      color: #555;
      background: #FAFAFF;
      outline: none;
      transition: border-color 0.2s;
    }
    .yt-input-row input:focus { border-color: #AEE2FF; }

    .yt-btn {
      padding: 8px 14px;
      background: linear-gradient(135deg, #AEE2FF, #D4BAFF);
      border: 2px solid white;
      border-radius: 50px;
      font-size: 12px;
      color: white;
      cursor: pointer;
      font-family: 'Fredoka One', cursive;
      box-shadow: 2px 2px 0 #9BB8E0;
      white-space: nowrap;
      transition: transform 0.15s;
    }
    .yt-btn:hover { animation: bounce 0.4s ease; }

    #youtube-embed iframe {
      width: 100%; aspect-ratio: 16/9;
      border-radius: 12px; border: none;
    }

    /* Song */
    .song-input {
      width: 100%;
      padding: 8px 14px;
      border: 2px solid #E8E8FF;
      border-radius: 50px;
      font-family: 'Jua', sans-serif;
      font-size: 13px;
      color: #555;
      background: #FAFAFF;
      outline: none;
      transition: border-color 0.2s;
    }
    .song-input:focus { border-color: #FFB6D9; }

    /* ── RIGHT PANEL ── */
    .right-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Book header */
    .book-header {
      display: flex;
      align-items: center;
      gap: 18px;
      animation-delay: 0.05s;
      overflow: visible;
      padding-top: 15px;
      padding-bottom: 15px;
    }

    .book-cover-wrap {
      position: relative;
      width: 82px;
      height: 70px;
      flex-shrink: 0;
      margin-left: auto;
      margin-right: 140px;
    }

    .book-cover-wrap img,
    .book-cover-wrap .no-cover-ph {
      position: absolute;
      width: 147px; height: 207px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(-15deg);
      object-fit: cover;
      border-radius: 6px 12px 12px 6px;
      box-shadow: 4px 4px 0 #AEE2FF;
      border: 3px solid white;
      outline: 2px solid #AEE2FF;
      z-index: 2;
    }

    .book-cover-wrap .no-cover-ph {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
    }

    .book-info h1 {
      font-family: 'Galmuri11', monospace;
      font-size: 26px;
      color: #444;
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .avg-stars {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stars-display {
      font-size: 20px;
      letter-spacing: 2px;
      color: #FFB347;
    }

    .avg-num {
      font-family: 'Fredoka One', cursive;
      font-size: 14px;
      color: #AAAACC;
    }

    /* Section titles */
    .section-title {
      font-family: 'Press Start 2P', 'Galmuri11', monospace;
      font-size: 8px;
      margin-bottom: 14px;
      line-height: 1.8;
      letter-spacing: 0.5px;
    }

    /* Oneliners */
    .oneliners-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .bubble-wrapper {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      max-width: 88%;
    }

    .bubble-wrapper.mine {
      align-items: flex-end;
      align-self: flex-end;
    }

    .name-badge {
      display: inline-block;
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 11px;
      margin-bottom: 5px;
      font-family: 'Gamja Flower', cursive;
      color: white;
    }

    .bubble {
      border-radius: 18px 18px 18px 4px;
      padding: 10px 16px;
      font-size: 13px;
      line-height: 1.6;
      color: #555;
      font-family: 'Jua', sans-serif;
    }

    .bubble-wrapper.mine .bubble {
      border-radius: 18px 18px 4px 18px;
    }

    .empty-state {
      color: #CCC;
      font-size: 13px;
      text-align: center;
      padding: 20px;
      font-family: 'Nanum Pen Script', cursive;
      font-size: 18px;
    }

    /* Passages grid */
    .passages-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 4px;
    }

    .passage-card {
      background: #FFFDE7;
      border-radius: 16px;
      padding: 14px;
      font-size: 12px;
      box-shadow: 4px 4px 0 #C8F57A;
      animation: popIn 0.4s ease backwards;
    }

    .passage-meta {
      font-size: 10px;
      color: #AAAACC;
      margin-bottom: 6px;
      font-family: 'Press Start 2P', 'Galmuri11', monospace;
      font-weight: bold;
      line-height: 1.8;
    }

    .passage-text {
      font-style: italic;
      color: #666;
      margin-bottom: 8px;
      line-height: 1.6;
      border-left: 3px solid #AEE2FF;
      padding-left: 8px;
      font-family: 'Nanum Pen Script', cursive;
      font-size: 14px;
    }

    .passage-comment {
      color: #999;
      font-size: 11px;
      line-height: 1.5;
      font-family: 'Jua', sans-serif;
    }

    /* ── BOTTOM FORM ── */
    .review-form-container {
      background: white;
      border-top: 4px dashed #AEE2FF;
      padding: 28px 20px 40px;
      margin-top: 20px;
      position: relative;
    }

    .review-form-container::before {
      content: '✦ ♡ ★ ♡ ✦';
      position: absolute;
      top: -14px; left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 0 12px;
      color: #AEE2FF;
      font-size: 14px;
      letter-spacing: 6px;
      white-space: nowrap;
    }

    .form-heading {
      font-family: 'Press Start 2P', 'Galmuri11', monospace;
      font-size: 10px;
      color: #88BBDD;
      margin-bottom: 20px;
      line-height: 1.8;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .edit-mode-badge {
      display: inline-block;
      background: linear-gradient(135deg, #C8F57A, #AEE2FF);
      color: white;
      border-radius: 50px;
      padding: 3px 14px;
      font-size: 10px;
      font-family: 'Fredoka One', cursive;
      box-shadow: 2px 2px 0 #88CC66;
    }

    .form-section-label {
      font-family: 'Press Start 2P', 'Galmuri11', monospace;
      font-size: 7px;
      color: #AAAACC;
      margin-bottom: 8px;
      display: block;
      letter-spacing: 1px;
      line-height: 1.8;
    }

    /* Form stars */
    .form-stars {
      display: flex;
      gap: 4px;
      margin-bottom: 18px;
    }

    .star-cell {
      position: relative;
      display: inline-block;
      font-size: 30px;
      line-height: 1;
      cursor: pointer;
      user-select: none;
      transition: transform 0.12s;
    }
    .star-cell:hover { transform: scale(1.2); }
    .star-empty { color: rgba(245,217,122,0.2); }
    .star-full {
      position: absolute;
      left: 0; top: 0;
      overflow: hidden;
      white-space: nowrap;
      color: #F5D97A;
      text-shadow: 0 0 3px #FFF5DC, 0 0 7px rgba(245,217,122,0.5);
      pointer-events: none;
      transition: width 0.08s;
    }

    /* Form grid */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 18px;
    }

    .form-textarea {
      width: 100%;
      padding: 10px 14px;
      border: 2.5px solid #E8E8FF;
      border-radius: 16px;
      font-family: 'Jua', sans-serif;
      font-size: 13px;
      color: #555;
      background: #FAFAFF;
      outline: none;
      resize: vertical;
      min-height: 70px;
      transition: border-color 0.2s;
      line-height: 1.6;
    }

    .form-textarea:focus { border-color: #FFB6D9; box-shadow: 0 0 0 3px rgba(255,182,217,0.15), 3px 3px 0 #FFB6D9; }

    /* Passage pairs */
    .passages-input-area { margin-bottom: 18px; }

    .passages-input-area h4 {
      font-family: 'Press Start 2P', 'Galmuri11', monospace;
      font-size: 7px;
      color: #AAAACC;
      margin-bottom: 12px;
      line-height: 1.8;
    }

    .passage-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
      padding: 14px;
      background: #FAFAFF;
      border-radius: 16px;
      border: 2.5px dashed #D4BAFF;
      position: relative;
    }

    .passage-pair textarea {
      width: 100%;
      padding: 8px 12px;
      border: 2px solid #E8E8FF;
      border-radius: 12px;
      font-family: 'Jua', sans-serif;
      font-size: 12px;
      color: #555;
      background: white;
      outline: none;
      resize: vertical;
      min-height: 60px;
      line-height: 1.6;
      transition: border-color 0.2s;
    }

    .passage-pair textarea:focus { border-color: #AEE2FF; }

    .remove-pair-btn {
      position: absolute;
      top: 8px; right: 10px;
      background: none;
      border: none;
      color: #CCC;
      cursor: pointer;
      font-size: 16px;
      transition: color 0.2s;
    }

    .remove-pair-btn:hover { color: #FF7BAC; }

    .add-passage-btn {
      width: 100%;
      padding: 10px;
      background: white;
      border: 2.5px dashed #C8F57A;
      border-radius: 50px;
      font-family: 'Fredoka One', cursive;
      font-size: 14px;
      color: #88CC66;
      cursor: pointer;
      transition: background 0.2s;
    }

    .add-passage-btn:hover { background: #F8FFF0; animation: bounce 0.4s ease; }

    /* Submit button */
    .submit-review-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #FFB6D9, #D4BAFF);
      border: 3px solid white;
      border-radius: 50px;
      font-family: 'Press Start 2P', 'Galmuri11', monospace;
      font-size: 10px;
      color: white;
      cursor: pointer;
      box-shadow: 4px 4px 0 #CC88AA;
      letter-spacing: 2px;
      line-height: 1.8;
      margin-top: 20px;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .submit-review-btn:hover { animation: bounce 0.45s ease; }
    .submit-review-btn:active { transform: translateY(3px); box-shadow: 1px 1px 0 #CC88AA; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: linear-gradient(135deg, #D4BAFF, #AEE2FF);
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 13px;
      z-index: 9999;
      transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
      box-shadow: 4px 4px 0 #9B8FCC;
      font-family: 'Jua', sans-serif;
      border: 2px solid white;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.err  { background: linear-gradient(135deg, #FF7BAC, #FFB6D9); box-shadow: 4px 4px 0 #CC5588; }

    .hidden { display: none !important; }

    /* Y2K section header pill */
    .section-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 50px;
      padding: 5px 16px;
      font-family: 'Press Start 2P', 'Galmuri11', monospace;
      font-size: 7px;
      color: white;
      margin-bottom: 12px;
      line-height: 1.8;
      letter-spacing: 0.5px;
    }

    .section-pill.blue   { background: linear-gradient(135deg,#AEE2FF,#D4BAFF); box-shadow:2px 2px 0 #9BB8E0; }
    .section-pill.pink   { background: linear-gradient(135deg,#FFB6D9,#D4BAFF); box-shadow:2px 2px 0 #CC88AA; }
    .section-pill.green  { background: linear-gradient(135deg,#C8F57A,#AEE2FF); box-shadow:2px 2px 0 #88CC66; }
  </style>
</head>
<body>

  <a class="home-btn" href="index.html">🏠 HOME</a>
  <a class="back-btn" onclick="history.back()">← BACK</a>
  <div class="deco-l">⭐<br>♡<br>✦<br>★</div>
  <div class="deco-r">✿<br>♡<br>⭐<br>✦</div>

  <div class="content">

    <div class="detail-layout">

      <!-- LEFT -->
      <div class="left-panel">

        <!-- 장소 사진 -->
        <div class="y2k-card" style="padding:12px; animation-delay:0s">
          <div class="card-label">PLACE PHOTO</div>
          <div class="photo-upload-area" id="photo-area" onclick="triggerPhotoUpload()">
            <input type="file" id="photo-input" accept="image/*" style="display:none" onchange="handlePhotoChange(event)">
            <img id="place-photo" alt="독서 장소">
            <div class="upload-placeholder" id="upload-placeholder">
              <span class="upload-icon">📸</span>
              <span>클릭해서<br>갤러리 사진 업로드</span>
            </div>
          </div>
        </div>

        <!-- Playlist (YouTube) -->
        <div class="y2k-card" style="animation-delay:0.08s">
          <div class="card-label">PLAYLIST 🎵</div>
          <div class="yt-input-row">
            <input type="text" id="youtube-url" placeholder="YouTube URL">
            <button class="yt-btn" onclick="embedYoutube()">▶ PLAY</button>
          </div>
          <div id="youtube-embed"></div>
        </div>

      </div>

      <!-- RIGHT -->
      <div class="right-panel">

        <!-- Book header -->
        <div class="y2k-card book-header" id="book-header" style="animation-delay:0.04s; overflow:visible"></div>

        <!-- Oneliners -->
        <div class="y2k-card pink" style="animation-delay:0.1s">
          <div class="section-pill pink">COMMENTS ♡</div>
          <div class="oneliners-list" id="oneliners"></div>
        </div>

        <!-- Passages -->
        <div class="y2k-card green" style="animation-delay:0.16s">
          <div class="section-pill green">PASSAGES ✦</div>
          <div class="passages-grid" id="passages-grid"></div>
        </div>

      </div>
    </div>

    <!-- BOTTOM FORM -->
    <div class="review-form-container">
      <div class="form-heading" id="form-title">MY RECORD ✈</div>

      <span class="form-section-label">RATING ★</span>
      <div class="form-stars" id="form-stars"></div>

      <div class="form-grid">
        <div>
          <span class="form-section-label">ONE-LINER ✍</span>
          <textarea class="form-textarea" id="form-oneliner" placeholder="이 책에 대한 한줄평을 남겨주세요"></textarea>
        </div>
      </div>

      <div class="passages-input-area">
        <h4>PASSAGES &amp; COMMENTS ✦</h4>
        <div id="passages-input"></div>
        <button class="add-passage-btn" onclick="addPassagePair()">+ ADD PASSAGE</button>
      </div>

      <button class="submit-review-btn" id="submit-btn" onclick="submitReview()">SAVE ★</button>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ── Firebase 초기화 ───────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyC_Q9TMiRoNV0lHw9kxL0TagT9B4ZWPPV8",
      authDomain: "bookswap-94dc2.firebaseapp.com",
      databaseURL: "https://bookswap-94dc2-default-rtdb.firebaseio.com",
      projectId: "bookswap-94dc2",
      storageBucket: "bookswap-94dc2.firebasestorage.app",
      messagingSenderId: "198519480023",
      appId: "1:198519480023:web:68c0c0fcfb867b9b371a92"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // In-memory 캐시
    let _books = [];
    let _reviews = [];
    let _users = [];

    // 실시간 리스너
    function setupRealtimeListeners() {
      db.ref('books').on('value', snap => {
        _books = snap.exists() ? Object.values(snap.val()) : [];
      });
      db.ref('reviews').on('value', snap => {
        _reviews = snap.exists() ? Object.values(snap.val()) : [];
        if (typeof loadBook === 'function' && currentBook) loadBook();
        if (typeof loadReviews === 'function' && currentBook) loadReviews();
      });
      db.ref('users').on('value', snap => {
        _users = snap.exists() ? Object.values(snap.val()) : [];
      });
    }

    // ── Helpers ───────────────────────────────────────────────
    function getCurrentUser() { try { return JSON.parse(sessionStorage.getItem('currentUser')); } catch { return null; } }
    function checkAuth()      { const u = getCurrentUser(); if (!u) window.location.href = 'login.html'; return u; }
    function generateId()     { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
    function getBooks()       { return _books; }
    function getReviews()     { return _reviews; }
    function getUsers()       { return _users; }
    function saveReviews(reviews) {
      const obj = {};
      reviews.forEach(r => { obj[r.bookId + '_' + r.userId] = r; });
      db.ref('reviews').set(obj);
    }

    function showToast(msg, isErr) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast' + (isErr ? ' err' : '');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    const FALLBACK_GRADIENTS = [
      'linear-gradient(160deg,#AEE2FF,#D4BAFF)',
      'linear-gradient(160deg,#FFB6D9,#D4BAFF)',
      'linear-gradient(160deg,#C8F57A,#AEE2FF)',
      'linear-gradient(160deg,#FFB6D9,#FFE0A0)',
    ];

    const BUBBLE_COLORS = [
      { bg:'#F0F8FF', border:'#AEE2FF' },
      { bg:'#FFF0F8', border:'#FFB6D9' },
      { bg:'#F8F0FF', border:'#D4BAFF' },
      { bg:'#F5FFF0', border:'#C8F57A' },
    ];

    const BADGE_GRADIENTS = [
      'linear-gradient(135deg,#AEE2FF,#D4BAFF)',
      'linear-gradient(135deg,#FFB6D9,#D4BAFF)',
      'linear-gradient(135deg,#C8F57A,#AEE2FF)',
      'linear-gradient(135deg,#FFB6D9,#FFE0A0)',
    ];

    // ── State ─────────────────────────────────────────────────
    let currentUser;
    let bookId;
    let currentBook;
    let currentReview = null;
    let formRating = 0;
    let pendingPhotoBase64 = '';
    let isEditMode = false;

    const DOT_COLORS = ['#72BFEE','#F07BAD','#92CC45','#AE85E0','#E0A620','#50C49A','#E09550','#A07EE0'];

    function hexToPastel(hex, blend = 0.78) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      const pr = Math.round(r + (255 - r) * blend);
      const pg = Math.round(g + (255 - g) * blend);
      const pb = Math.round(b + (255 - b) * blend);
      return `rgb(${pr},${pg},${pb})`;
    }

    function applyBackground() {
      const users = getUsers();
      const userIdxMap = {};
      users.forEach((u, idx) => { userIdxMap[u.id] = idx; });
      const ownerIdx = userIdxMap[currentBook.registeredBy] ?? 0;
      const pastel = hexToPastel(DOT_COLORS[ownerIdx % DOT_COLORS.length]);
      document.body.style.background = pastel;
      document.body.style.backgroundImage = `radial-gradient(circle, white 7px, transparent 7px)`;
      document.body.style.backgroundSize = `44px 44px`;
    }

    // ── Init ──────────────────────────────────────────────────
    function init() {
      currentUser = checkAuth();
      const params = new URLSearchParams(location.search);
      bookId = params.get('id');
      if (!bookId) { window.location.href = 'index.html'; return; }

      setupRealtimeListeners();

      // books + reviews 동시에 기다린 후 초기화
      Promise.all([
        db.ref('books').once('value'),
        db.ref('reviews').once('value'),
        db.ref('users').once('value'),
      ]).then(([bSnap, rSnap, uSnap]) => {
        _books   = bSnap.exists() ? Object.values(bSnap.val()) : [];
        _reviews = rSnap.exists() ? Object.values(rSnap.val()) : [];
        _users   = uSnap.exists() ? Object.values(uSnap.val()) : [];
        currentBook = _books.find(b => b.id === bookId);
        if (!currentBook) { window.location.href = 'index.html'; return; }
        applyBackground();
        loadBook();
        loadReviews();
        initFormStars(0);
        const hadReview = loadCurrentUserReview();
        if (!hadReview) addPassagePair();
      });
    }

    // ── Book header ───────────────────────────────────────────
    function loadBook() {
      const container = document.getElementById('book-header');
      const avg = calcAvgRating();
      const starsStr = [...Array(5)].map((_,i) => i < Math.round(avg) ? '★' : '☆').join('');
      const gi = getBooks().findIndex(b => b.id === currentBook.id);
      const coverInner = currentBook.cover
        ? `<img src="${currentBook.cover}" alt="cover">`
        : `<div class="no-cover-ph" style="background:${FALLBACK_GRADIENTS[gi%4]}">📚</div>`;
      const coverEl = `<div class="book-cover-wrap">${coverInner}</div>`;

      container.innerHTML = `
        <div class="book-info">
          <h1>${escHtml(currentBook.title)}</h1>
          <div class="avg-stars">
            <span class="stars-display">${starsStr}</span>
            <span class="avg-num">${avg > 0 ? avg.toFixed(1) + ' / 5.0' : 'NO RATING YET'}</span>
          </div>
        </div>
        ${coverEl}
      `;
    }

    function calcAvgRating() {
      const r = getReviews().filter(r => r.bookId === bookId && r.rating > 0);
      return r.length ? r.reduce((s,r) => s+r.rating, 0) / r.length : 0;
    }

    // ── Reviews ───────────────────────────────────────────────
    function loadReviews() {
      const reviews = getReviews().filter(r => r.bookId === bookId);
      const list    = document.getElementById('oneliners');
      const grid    = document.getElementById('passages-grid');
      list.innerHTML = '';
      grid.innerHTML = '';

      if (reviews.length === 0) {
        list.innerHTML = '<div class="empty-state">아직 코멘트가 없어요 🌟<br>첫 번째 기록을 남겨보세요!</div>';
        return;
      }

      reviews.forEach((review, ri) => {
        renderOneLiner(review, ri);
        (review.passages || []).forEach(p => renderPassage(p, review, ri));
      });

      if (!grid.children.length) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#CCC;font-family:Jua,sans-serif;padding:20px;font-size:13px">아직 등록된 구절이 없어요 📖</div>';
      }
    }

    function renderOneLiner(review, ri) {
      if (!review.oneLiner) return;
      const isMine = review.userId === currentUser.id;
      const bc     = BUBBLE_COLORS[ri % BUBBLE_COLORS.length];
      const bg     = BADGE_GRADIENTS[ri % BADGE_GRADIENTS.length];

      const wrapper = document.createElement('div');
      wrapper.className = 'bubble-wrapper' + (isMine ? ' mine' : '');

      const badge = document.createElement('div');
      badge.className = 'name-badge';
      badge.style.background = bg;
      badge.textContent = review.userName + (isMine ? ' ✦' : '');

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.style.cssText = `background:${bc.bg}; border:2.5px solid ${bc.border}; box-shadow:3px 3px 0 ${bc.border};`;
      bubble.textContent = review.oneLiner;

      wrapper.appendChild(badge);
      wrapper.appendChild(bubble);
      document.getElementById('oneliners').appendChild(wrapper);
    }

    function renderPassage(passage, review, ri) {
      if (!passage.text) return;
      const card = document.createElement('div');
      card.className = 'passage-card';
      card.style.animationDelay = `${ri * 0.06}s`;
      card.innerHTML = `
        <div class="passage-meta"><span style="font-size:1.3em">${escHtml(review.userName)}</span><span style="font-size:0.75em">'s pick!</span></div>
        <div class="passage-text">"${escHtml(passage.text)}"</div>
        ${passage.comment ? `<div class="passage-comment">💬 ${escHtml(passage.comment)}</div>` : ''}
      `;
      document.getElementById('passages-grid').appendChild(card);
    }

    // ── Edit mode ─────────────────────────────────────────────
    function loadCurrentUserReview() {
      currentReview = getReviews().find(r => r.bookId === bookId && r.userId === currentUser.id) || null;
      if (!currentReview) return false;

      isEditMode = true;
      document.getElementById('form-title').innerHTML =
        'MY RECORD ✏ <span class="edit-mode-badge">EDIT MODE</span>';
      document.getElementById('submit-btn').textContent = 'UPDATE ✏';

      formRating = currentReview.rating || 0;
      renderFormStars(formRating);
      document.getElementById('form-oneliner').value = currentReview.oneLiner || '';

      if (currentReview.youtubeUrl) {
        document.getElementById('youtube-url').value = currentReview.youtubeUrl;
        embedYoutube();
      }

      if (currentReview.placePhoto) {
        pendingPhotoBase64 = currentReview.placePhoto;
        const img = document.getElementById('place-photo');
        img.src = currentReview.placePhoto;
        img.style.display = 'block';
        document.getElementById('upload-placeholder').style.display = 'none';
      }

      const passagesInput = document.getElementById('passages-input');
      passagesInput.innerHTML = '';
      if (currentReview.passages && currentReview.passages.length > 0) {
        currentReview.passages.forEach(p => addPassagePair(p.text, p.comment));
      } else {
        addPassagePair();
      }
      return true;
    }

    // ── Photo ─────────────────────────────────────────────────
    function triggerPhotoUpload() { document.getElementById('photo-input').click(); }

    function handlePhotoChange(e) {
      const file = e.target.files[0];
      if (!file) return;
      resizeImageToBase64(file, 1200, 900, b64 => {
        pendingPhotoBase64 = b64;
        const img = document.getElementById('place-photo');
        img.src = b64;
        img.style.display = 'block';
        document.getElementById('upload-placeholder').style.display = 'none';

        // 사진을 즉시 review에 저장
        const reviews = getReviews();
        const idx = reviews.findIndex(r => r.bookId === bookId && r.userId === currentUser.id);
        if (idx !== -1) {
          reviews[idx].placePhoto = b64;
          saveReviews(reviews);
        }
      });
    }

    function resizeImageToBase64(file, maxW, maxH, cb) {
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
          let w = img.width, h = img.height;
          if (w > maxW) { h = Math.round(h*maxW/w); w = maxW; }
          if (h > maxH) { w = Math.round(w*maxH/h); h = maxH; }
          const c = document.createElement('canvas');
          c.width = w; c.height = h;
          c.getContext('2d').drawImage(img, 0, 0, w, h);
          cb(c.toDataURL('image/jpeg', 0.75));
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }

    // ── YouTube ───────────────────────────────────────────────
    function embedYoutube() {
      const url = document.getElementById('youtube-url').value.trim();
      if (!url) { showToast('YouTube URL을 입력해주세요', true); return; }
      const match = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([A-Za-z0-9_-]{11})/);
      if (!match) { showToast('올바른 YouTube URL이 아니에요', true); return; }
      document.getElementById('youtube-embed').innerHTML =
        `<iframe src="https://www.youtube.com/embed/${match[1]}" allowfullscreen allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"></iframe>`;

      // URL을 즉시 review에 저장
      const reviews = getReviews();
      const idx = reviews.findIndex(r => r.bookId === bookId && r.userId === currentUser.id);
      if (idx !== -1) {
        reviews[idx].youtubeUrl = url;
        saveReviews(reviews);
      }
    }

    // ── Passages ──────────────────────────────────────────────
    function addPassagePair(text, comment) {
      const pair = document.createElement('div');
      pair.className = 'passage-pair';
      pair.innerHTML = `
        <textarea placeholder="인상 깊었던 구절을 적어주세요">${escHtml(text||'')}</textarea>
        <textarea placeholder="독서메이트 코멘트를 남겨주세요">${escHtml(comment||'')}</textarea>
        <button class="remove-pair-btn" onclick="this.parentElement.remove()">✕</button>
      `;
      document.getElementById('passages-input').appendChild(pair);
    }

    function collectPassages() {
      return Array.from(document.querySelectorAll('.passage-pair')).map(pair => {
        const txts = pair.querySelectorAll('textarea');
        return { text: txts[0]?.value.trim()||'', comment: txts[1]?.value.trim()||'' };
      }).filter(p => p.text);
    }

    // ── Form stars (반별 지원) ────────────────────────────────
    function renderFormStars(rating) {
      const cells = document.querySelectorAll('#form-stars .star-cell');
      cells.forEach((cell, i) => {
        const fill = Math.min(Math.max(rating - i, 0), 1);
        cell.querySelector('.star-full').style.width = (fill >= 1 ? 100 : fill >= 0.5 ? 50 : 0) + '%';
      });
    }

    function resetFormStars() { renderFormStars(formRating); }
    function setFormStar(n)   { formRating = n; renderFormStars(n); }

    function initFormStars(initRating = 0) {
      const container = document.getElementById('form-stars');
      container.innerHTML = '';
      for (let i = 1; i <= 5; i++) {
        const cell = document.createElement('span');
        cell.className = 'star-cell';
        cell.innerHTML = '<span class="star-empty">✦</span><span class="star-full" style="width:0%">✦</span>';
        container.appendChild(cell);
      }
      renderFormStars(initRating);

      container.addEventListener('mousemove', e => {
        const cell = e.target.closest('.star-cell');
        if (!cell) return;
        const cells = [...container.querySelectorAll('.star-cell')];
        const idx   = cells.indexOf(cell);
        const rect  = cell.getBoundingClientRect();
        renderFormStars(idx + (e.clientX < rect.left + rect.width / 2 ? 0.5 : 1));
      });
      container.addEventListener('mouseleave', resetFormStars);
      container.addEventListener('click', e => {
        const cell = e.target.closest('.star-cell');
        if (!cell) return;
        const cells = [...container.querySelectorAll('.star-cell')];
        const idx   = cells.indexOf(cell);
        const rect  = cell.getBoundingClientRect();
        setFormStar(idx + (e.clientX < rect.left + rect.width / 2 ? 0.5 : 1));
      });
    }

    // ── Submit ────────────────────────────────────────────────
    function submitReview() {
      if (formRating === 0) { showToast('별점을 선택해주세요 ★', true); return; }

      const reviewData = {
        bookId,
        userId:      currentUser.id,
        userName:    currentUser.name,
        rating:      formRating,
        oneLiner:    document.getElementById('form-oneliner').value.trim(),
        mateComment: '',
        passages:    collectPassages(),
        placePhoto:  pendingPhotoBase64,
        youtubeUrl:  document.getElementById('youtube-url').value.trim(),
        song:        '',
        createdAt:   new Date().toISOString(),
      };

      const reviews = getReviews();
      if (isEditMode) {
        const idx = reviews.findIndex(r => r.bookId===bookId && r.userId===currentUser.id);
        if (idx !== -1) { reviewData.createdAt = reviews[idx].createdAt; reviews[idx] = reviewData; }
      } else {
        reviews.push(reviewData);
        isEditMode = true;
        document.getElementById('form-title').innerHTML = 'MY RECORD ✏ <span class="edit-mode-badge">EDIT MODE</span>';
        document.getElementById('submit-btn').textContent = 'UPDATE ✏';
      }

      saveReviews(reviews);
      loadBook();
      loadReviews();
      showToast(isEditMode ? '✏ 수정되었어요!' : '★ 기록이 저장되었어요!');
    }

    init();
  </script>
</body>
</html>
