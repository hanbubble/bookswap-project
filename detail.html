<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>교환독서 기록장 — 책 상세</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Pen+Script&family=Press+Start+2P&family=Fredoka+One&family=Gamja+Flower&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/gh/quiple/galmuri/dist/galmuri.css" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="user-colors.js"></script>
  <link rel="stylesheet" href="nav.css">
  <link rel="stylesheet" href="detail.css">
  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "w7uoiuojb5");
  </script>
</head>
<body>

  <a class="home-btn" id="home-btn" href="index.html">🏠 HOME</a>
  <a class="back-btn" onclick="history.back()">← BACK</a>
  <div class="deco-l">⭐<br>♡<br>✦<br>★</div>
  <div class="deco-r">✿<br>♡<br>⭐<br>✦</div>

  <div class="content">

    <div class="detail-layout">

      <!-- LEFT -->
      <div class="left-panel">

        <!-- 장소 사진 -->
        <div class="y2k-card" style="padding:12px; animation-delay:0s">
          <div class="card-label">PLACE PHOTO</div>
          <div class="photo-upload-area" id="photo-area">
            <input type="file" id="photo-input" accept="image/*" style="display:none" onchange="handlePhotoChange(event)">
            <img id="place-photo" alt="독서 장소" onclick="openPhotoLightbox()">
            <div class="upload-placeholder" id="upload-placeholder" onclick="triggerPhotoUpload()">
              <span class="upload-icon">📸</span>
              <span>클릭해서<br>갤러리 사진 업로드</span>
            </div>
            <button class="photo-edit-btn" id="photo-edit-btn" onclick="triggerPhotoUpload()" style="display:none">수정</button>
          </div>
        </div>

        <!-- Playlist (YouTube) -->
        <div class="y2k-card" style="animation-delay:0.08s">
          <div class="card-label">PLAYLIST 🎵</div>
          <div class="yt-input-row">
            <input type="text" id="youtube-url" placeholder="YouTube URL" oninput="updateYtBtn()">
            <button class="yt-btn" id="yt-btn" onclick="handleYtBtn()">💾 SAVE</button>
          </div>
          <div id="youtube-embed"></div>
        </div>

      </div>

      <!-- RIGHT -->
      <div class="right-panel">

        <!-- Book header -->
        <div class="y2k-card book-header" id="book-header" style="animation-delay:0.04s; overflow:visible"></div>

        <!-- Oneliners -->
        <div class="y2k-card pink" style="animation-delay:0.1s">
          <div class="section-pill pink">COMMENTS ♡</div>
          <div class="oneliners-list" id="oneliners"></div>
        </div>

        <!-- Passages -->
        <div class="y2k-card green" style="animation-delay:0.16s">
          <div class="section-pill green">PASSAGES ✦</div>
          <div class="passages-grid" id="passages-grid"></div>
        </div>

      </div>
    </div>

    <!-- BOTTOM FORM -->
    <div class="review-form-container">
      <div class="form-heading" id="form-title">MY RECORD ✈</div>

      <span class="form-section-label">RATING ★</span>
      <div class="form-stars" id="form-stars"></div>

      <div class="form-grid">
        <div>
          <span class="form-section-label">REVIEW ✍</span>
          <textarea class="form-textarea" id="form-oneliner" placeholder="이 책에 대한 한줄평을 남겨주세요"></textarea>
        </div>
      </div>

      <div class="passages-input-area">
        <h4>PASSAGES &amp; COMMENTS ✦</h4>
        <div id="passages-input"></div>
        <button class="add-passage-btn" onclick="addPassagePair()">+ ADD PASSAGE</button>
      </div>

      <button class="submit-review-btn" id="submit-btn" onclick="submitReview()">SAVE ★</button>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <nav class="mobile-nav">
    <button class="mobile-nav-btn" onclick="window.location.href='waiting.html'">
      <span class="mobile-nav-icon">🚪</span>
      <span class="mobile-nav-label">ROOM</span>
    </button>
    <button class="mobile-nav-btn mobile-nav-home" onclick="goLastRoom()">
      <span class="mobile-nav-icon">🏠</span>
      <span class="mobile-nav-label">HOME</span>
    </button>
    <button class="mobile-nav-btn" onclick="window.location.href='private.html'">
      <span class="mobile-nav-icon">🔒</span>
      <span class="mobile-nav-label">MY</span>
    </button>
  </nav>

  <script src="common.js"></script>
  <script src="detail.js"></script>
</body>
</html>
